<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .navbar {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">My Cards</span>
            <form action="/timezone" method="post" class="d-flex align-items-center gap-2">
                <label for="timezoneSelect" class="form-label mb-0 text-nowrap">Time Zone:</label>
                <select id="timezoneSelect" name="timezone" class="form-select form-select-sm">
                    {% for tz_key, tz_label in timezones.items() %}
                    <option value="{{ tz_key }}" {% if tz_key == current_tz %}selected{% endif %}>{{ tz_label }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="btn btn-sm btn-outline-secondary text-nowrap">Save</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="row row-cols-1 g-3">
            {% for card in cards %}
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ card.name }}</h5>
                        <p class="card-text">Last used: {{
                            card.updated_at.replace(tzinfo=from_tz).astimezone(to_tz).strftime('%m/%d %H:%M') }}</p>
                        <button onclick="useCard('{{ card.id }}', '{{ card.name }}')" class="btn btn-primary">Use
                            Card</button>
                        <button onclick="deleteCard('{{ card.id }}', '{{ card.name }}')" class="btn btn-danger">Delete
                            Card</button>
                    </div>
                </div>
            </div>
            {% endfor %}
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <form action="/cards" method="post">
                            <div class="row g-3 align-items-center">
                                <div class="col-auto">
                                    <input type="text" name="name" placeholder="Card Name" class="form-control">
                                </div>
                                <div class="col-auto">
                                    <button type="submit" class="btn btn-primary">Add Card</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script>
        // Record page load time and check for refresh on tab visibility
        (function () {
            const REFRESH_THRESHOLD = 4 * 60 * 60 * 1000; // 4 hours in milliseconds

            // Record the current time when page loads
            let pageLoadTime = Date.now();

            // Check if page should be refreshed when tab becomes visible
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden) {
                    // Tab is now visible
                    const timeElapsed = Date.now() - pageLoadTime;
                    if (timeElapsed >= REFRESH_THRESHOLD) {
                        // More than 4 hours have passed, refresh the page
                        window.location.reload();
                    } else {
                        // Still within 4 hours, update the time to current time
                        pageLoadTime = Date.now();
                    }
                }
            });
        })();

        function useCard(id, name) {
            if (!confirm(`Are you sure you want to use the card ${name}?`)) {
                return;
            }

            fetch(`/cards/${id}`, {
                method: 'POST',
            }).then(() => {
                window.location.href = '/cards';
            }).catch((error) => {
                alert("The request failed. Please try again.");
                window.location.reload();
            });
        }

        function deleteCard(id, name) {
            if (!confirm(`Are you sure you want to delete the card ${name}?`)) {
                return;
            }

            fetch(`/cards/${id}`, {
                method: 'DELETE',
            }).then(() => {
                window.location.href = '/cards';
            }).catch((error) => {
                alert("The request failed. Please try again.");
                window.location.reload();
            });
        }
    </script>
</body>

</html>
